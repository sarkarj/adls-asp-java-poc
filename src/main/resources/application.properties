# ============================================================
# ADLS ASP File Transfer PoC — Spring Boot Configuration
# ============================================================
# All sensitive values come from Azure App Service App Settings
# (injected as environment variables — never hardcoded here)
# ============================================================

# --- Server ---
# PORT env var is set dynamically by Azure App Service
server.port=${PORT:8080}

# --- Spring Boot Actuator ---
# Expose health + info only — no metrics, no env, no beans
management.endpoints.web.exposure.include=health,info
management.endpoints.web.base-path=/actuator
# Never expose internal details — UP/DOWN only
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# --- Application Info (shown at /actuator/info) ---
spring.application.name=adls-asp-poc
info.app.name=ADLS-ASP Bidirectional File Transfer PoC
info.app.version=2.0.0
info.app.java=21

# --- Request Size Limits — defense against large payload attacks ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-form-post-size=10485760

# --- Logging ---
# Application logs — INFO level
logging.level.com.poc.adls=INFO
# Azure SDK — WARN only (suppress verbose SDK logs)
logging.level.com.azure=WARN
logging.level.com.azure.core=WARN
logging.level.com.azure.identity=WARN
# Spring — WARN only (suppress framework noise)
logging.level.org.springframework=WARN
logging.level.org.springframework.web=WARN
