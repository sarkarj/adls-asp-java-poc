# ============================================================
# ADLS ASP File Transfer PoC — Spring Boot Configuration
# ============================================================
# All sensitive values come from Azure App Service App Settings
# (injected as environment variables — never hardcoded here)
# ============================================================

# --- Server ---
# PORT env var is set dynamically by Azure App Service
server.port=${PORT:8080}

# --- Spring Boot Actuator ---
# F2 FIX: expose health only — info endpoint removed (version disclosure risk)
# /actuator/info exposed app version + Java version — useful to attackers for CVE targeting
management.endpoints.web.exposure.include=health
management.endpoints.web.base-path=/actuator
# Never expose internal details — UP/DOWN only
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# --- Request Size Limits — defense against large payload attacks ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-form-post-size=10485760

# --- Logging ---
# Application logs — INFO level
logging.level.com.poc.adls=INFO
# Azure SDK — WARN only (suppress verbose SDK logs that may contain internal details)
logging.level.com.azure=WARN
logging.level.com.azure.core=WARN
logging.level.com.azure.identity=WARN
# Spring — WARN only (suppress framework noise)
logging.level.org.springframework=WARN
logging.level.org.springframework.web=WARN

# --- Error Handling — prevent internal detail leakage ---
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false
